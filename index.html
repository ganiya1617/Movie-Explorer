<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Movie App</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

  <!-- LEFT SIDEBAR -->
  <div class="sidebar">
    <h2>Filters</h2>

    <input type="number" id="year" placeholder="Year">

    <label>Rating:</label>
    <input type="range" id="rating" min="0" max="10" step="0.5" value="0">
    <span id="ratingValue">0</span>

    <label>Genre:</label>
    <select id="genre">
      <option value="">All</option>
    </select>

    <label>Sort:</label>
    <select id="sort">
      <option value="popularity.desc">Popularity</option>
      <option value="vote_average.desc">Rating High → Low</option>
      <option value="vote_average.asc">Rating Low → High</option>
    </select>

    <button id="apply">Apply</button>
  </div>

  <!-- RIGHT CONTENT -->
  <div class="main">
    <h1>🎬 Movie Explorer</h1>

    <input type="text" id="search" placeholder="Search movie...">

    <div id="movies"></div>
  </div>

</div>

<script src="index.js"></script>
</body>
</html>
